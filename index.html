<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" 
          content="width=device-width, 
                   initial-scale=1.0">
    <title>Margin-Top Issue Example</title>
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
</head>

<body class="bg-gray-100 p-10">

    <!-- Section with Margin-Top Issue -->
    <div class="bg-yellow-200 p-10 mb-12 w-1/3 ml-0">
        <div class="bg-yellow-300 p-10 border border-yellow-600">
            <span class="mt-10 text-4xl bg-yellow-500 
                         text-white p-6 border
                         border-yellow-700">No visible margin.
             </span>
        </div>
    </div>

    <!-- Section with Correct Margin-Top -->
    <div class="bg-blue-200 p-10 w-1/3 ml-0">
        <div class="bg-blue-300 p-10 border
                    border-blue-600">
            <span class="mt-10 text-4xl inline-block
                         bg-blue-500 text-white p-6
                         border border-blue-700">Visible margin.
          </span>
        </div>
    </div>

</body>

</html>
