<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link href="./src/output.css" rel="stylesheet">
  <!-- <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> -->
   <script src="https://cdn.tailwindcss.com/3.4.16"></script>

</head>

<body class="bg-gray-100">

<!-- Navbar -->
<nav class="bg-blue-600 text-white p-4 flex justify-between">
  <h1 class="text-2xl font-bold">Dashboard</h1>
  <a href="login.html" class="hover:text-yellow-300">Logout</a>
</nav>

<!-- Stats -->
<div class="p-10 grid md:grid-cols-3 gap-6">

  <div class="bg-white p-6 rounded shadow">
    <h2 class="text-xl font-bold">Users</h2>
    <p class="text-3xl mt-2">1,245</p>
  </div>

  <div class="bg-white p-6 rounded shadow">
    <h2 class="text-xl font-bold">Revenue</h2>
    <p class="text-3xl mt-2">$8,430</p>
  </div>

  <div class="bg-white p-6 rounded shadow">
    <h2 class="text-xl font-bold">Orders</h2>
    <p class="text-3xl mt-2">320</p>
  </div>

</div>

<!-- Table -->
<div class="p-10">
  <h2 class="text-2xl font-bold mb-4">Recent Users</h2>

  <table class="w-full bg-white shadow rounded">
    <tr class="bg-gray-200">
      <th class="p-3">Name</th>
      <th>Email</th>
      <th>Status</th>
    </tr>

    <tr class="text-center">
      <td class="p-3">John</td>
      <td>john@mail.com</td>
      <td class="text-green-600">Active</td>
    </tr>

    <tr class="text-center">
      <td class="p-3">Sara</td>
      <td>sara@mail.com</td>
      <td class="text-red-600">Inactive</td>
    </tr>
  </table>
</div>

</body>
</html>
